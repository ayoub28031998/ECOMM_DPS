<main class="main">
  <div class="login-container">
    <h2 class="title">Réinitialiser le Mot de Passe</h2>

    <p class="subtitle">
      Entrez votre adresse e-mail et un nouveau mot de passe pour réinitialiser votre mot de passe.
    </p>

    <!-- Display success or error messages -->
    <div *ngIf="successMessage" class="alert alert-success">
      {{ successMessage }}
    </div>
    <div *ngIf="errorMessage" class="alert alert-danger">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="resetPassword()">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input
          type="email"
          id="email"
          class="form-control"
          placeholder="Entrez votre e-mail"
          [(ngModel)]="email"
          name="email"
          required
        />
      </div>

      <div class="form-group">
        <label for="new_password">Nouveau Mot de Passe</label>
        <div class="password-group" style="position: relative;">
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="new_password"
            class="form-control"
            placeholder="Entrez votre nouveau mot de passe"
            [(ngModel)]="newPassword"
            name="newPassword"
            required
          />
          <i
            class="toggle-password fa"
            [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"
            (click)="togglePasswordVisibility()"
            style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer;"
          ></i>
        </div>
      </div>
      
      <div class="form-group">
        <label for="confirm_password">Confirmer le Mot de Passe</label>
        <input
          [type]="showPassword ? 'text' : 'password'"
          id="confirm_password"
          class="form-control"
          placeholder="Confirmez votre nouveau mot de passe"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          required
        />
      </div>

      <button type="submit" class="btn btn-primary btn-block">
        Réinitialiser le Mot de Passe
      </button>
    </form>

    <p class="text-center mt-3">
      Vous vous souvenez de votre mot de passe ? <a routerLink="/login" style="color:#A72B78">Connectez-vous</a>
    </p>
  </div>
</main>

<app-footer></app-footer>
